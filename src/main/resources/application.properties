spring.application.name=daimler-ar-wiring-harness
server.port=8080
# server.servlet.context-path=/api/v1
server.compression.enabled=true
server.compression.min-response-size=1024

# Swagger/OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs

# Logging - Set in application-{profile}.properties
logging.level.root=INFO
logging.level.com.harness=DEBUG
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=7

# Storage Configuration - Can be overridden in application-{profile}.properties
app.use-s3=true

# AWS S3 Configuration
aws.region=ap-south-1
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}
aws.s3.bucket=diamler-storage-bucket

# Local storage
app.local-storage-path=./uploads

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:harnessdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# spring.profiles.active=prod

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
