spring.application.name=daimler-ar-wiring-harness
server.port=8081
server.servlet.context-path=/api/v1
server.compression.enabled=true
server.compression.min-response-size=1024

# Swagger/OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs

# Logging - Set in application-{profile}.properties
logging.level.root=INFO
logging.level.com.harness=DEBUG
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=7

# Storage Configuration - Can be overridden in application-{profile}.properties
app.use-s3=false

# AWS S3 Configuration
aws.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:daimler-harness-cdn-dev}

# Local storage
app.local-storage-path=./uploads

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
