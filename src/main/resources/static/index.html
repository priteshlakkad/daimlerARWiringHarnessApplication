<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daimler AR Wiring Harness Manager</title>
    <style>
        :root {
            --primary: #00adee;
            /* Daimler Blue-ish */
            --primary-hover: #0099cc;
            --secondary: #1a1a1a;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.8s ease;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--secondary);
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        header p {
            color: #666;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            flex: 1;
            min-width: 350px;
            max-width: 600px;
            transition: var(--transition);
            animation: fadeInUp 0.8s ease;
        }

        .card:hover {
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--secondary);
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #444;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fdfdfd;
            transition: var(--transition);
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 173, 238, 0.1);
        }

        input[type="file"]::file-selector-button {
            background: #eef2f5;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            color: #333;
            cursor: pointer;
            margin-right: 1rem;
            font-weight: 500;
            transition: var(--transition);
        }

        input[type="file"]::file-selector-button:hover {
            background: #dfe5eb;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-msg {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 500;
            display: none;
            text-align: center;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .file-list {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .file-item {
            background: #f9f9f9;
            border: 1px solid #ebebeb;
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .file-item:hover {
            background: #f1f4f6;
            border-color: #cdd5dc;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-right: 1rem;
        }

        .file-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-key {
            font-size: 0.8rem;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .download-btn {
            background-color: #1a1a1a;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .download-btn:hover {
            background-color: #333;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            color: #888;
            padding: 2rem 0;
            font-style: italic;
        }

        .hint {
            font-size: 0.82rem;
            color: #888;
            margin-top: 0.3rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Daimler AR Wiring Harness</h1>
        <p>Manage and download wiring harness assets efficiently</p>
        <p style="margin-top:0.6rem;">
            <a href="/all-files.html"
                style="color:var(--primary);font-weight:600;text-decoration:none;font-size:0.97rem;">
                📥 Browse Downloadable Files (All Truck Models) →
            </a>
        </p>
    </header>

    <div class="container">
        <!-- Upload Section -->
        <div class="card">
            <h2>Upload Harness Files</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="uploadTruckModel">Truck Model (Required)</label>
                    <input type="text" id="uploadTruckModel" name="uploadTruckModel" placeholder="e.g. ACTROS" required>
                </div>

                <div class="form-group">
                    <label for="harnessId">Harness ID (Required)</label>
                    <input type="text" id="harnessId" name="harnessId" placeholder="e.g. HARN123" required>
                </div>

                <div class="form-group">
                    <label for="info">Info PDF</label>
                    <input type="file" id="info" name="info" accept="application/pdf">
                </div>

                <div class="form-group">
                    <label for="troubleshooting">Troubleshooting PDF</label>
                    <input type="file" id="troubleshooting" name="troubleshooting" accept="application/pdf">
                </div>

                <div class="form-group">
                    <label for="wiring">Wiring PDF</label>
                    <input type="file" id="wiring" name="wiring" accept="application/pdf">
                </div>

                <div class="form-group">
                    <label for="powerFlow">Powerflow Video</label>
                    <input type="file" id="powerFlow" name="powerFlow" accept="video/mp4,video/x-m4v,video/*">
                </div>

                <div class="form-group">
                    <label for="repair">Repair Video</label>
                    <input type="file" id="repair" name="repair" accept="video/mp4,video/x-m4v,video/*">
                </div>

                <div class="form-group">
                    <label for="endDevices">End Devices JSON</label>
                    <input type="file" id="endDevices" name="endDevices" accept="application/json">
                </div>

                <div class="form-group">
                    <label for="iosBundle">Image Recognitions Raw Images (Multiple allowed)</label>
                    <input type="file" id="iosBundle" name="iosBundle">
                </div>

                <div class="form-group">
                    <label for="knowledge">Knowledge PDFs (Multiple allowed)</label>
                    <input type="file" id="knowledge" name="knowledge" accept="application/pdf" multiple>
                </div>

                <button type="submit" id="uploadBtn">
                    <span>Upload Harness</span>
                    <div class="spinner" id="uploadSpinner"></div>
                </button>
            </form>
            <div id="uploadStatus" class="status-msg"></div>
        </div>

        <!-- Retrieve/Download Section -->
        <div class="card">
            <h2>Retrieve &amp; Download</h2>
            <form id="retrieveForm">
                <div class="form-group">
                    <label for="searchTruckModel">Truck Model (Optional)</label>
                    <input type="text" id="searchTruckModel" placeholder="e.g. ACTROS">
                    <p class="hint">Leave blank to search across all truck models by Harness ID.</p>
                </div>
                <div class="form-group">
                    <label for="searchHarnessId">Harness ID (Required)</label>
                    <input type="text" id="searchHarnessId" placeholder="e.g. HARN123" required>
                </div>
                <button type="submit" id="retrieveBtn">
                    <span>Fetch Files</span>
                    <div class="spinner" id="retrieveSpinner"></div>
                </button>
            </form>

            <div id="retrieveStatus" class="status-msg"></div>

            <div class="file-list" id="fileList">
                <div class="empty-state">Enter a Harness ID to view files</div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration - includes Spring Boot context path /api/v1
        const API_BASE = window.location.origin + '/api/v1';

        // Elements
        const uploadForm = document.getElementById('uploadForm');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadSpinner = document.getElementById('uploadSpinner');
        const uploadStatus = document.getElementById('uploadStatus');

        const retrieveForm = document.getElementById('retrieveForm');
        const retrieveBtn = document.getElementById('retrieveBtn');
        const retrieveSpinner = document.getElementById('retrieveSpinner');
        const retrieveStatus = document.getElementById('retrieveStatus');
        const fileList = document.getElementById('fileList');

        // Helper to show status
        function showStatus(element, message, isError = false) {
            element.textContent = message;
            element.className = `status-msg ${isError ? 'status-error' : 'status-success'}`;
        }

        // Handle Upload
        // URL pattern: POST /api/v1/truckModel/{truckModel}/harnesses/{harnessId}
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const truckModel = document.getElementById('uploadTruckModel').value.trim();
            const harnessId = document.getElementById('harnessId').value.trim();

            if (!truckModel) {
                showStatus(uploadStatus, 'Truck Model is required', true);
                return;
            }
            if (!harnessId) {
                showStatus(uploadStatus, 'Harness ID is required', true);
                return;
            }

            // Build FormData manually — only include file inputs that have a file selected.
            // Using new FormData(form) would send empty binary blobs for unselected inputs.
            const formData = new FormData();

            // Single-file fields
            const singleFileFields = ['info', 'troubleshooting', 'wiring', 'powerFlow', 'repair', 'endDevices', 'iosBundle'];
            for (const fieldName of singleFileFields) {
                const input = document.getElementById(fieldName);
                if (input && input.files && input.files.length > 0) {
                    formData.append(fieldName, input.files[0]);
                }
            }

            // Multi-file field: knowledge
            const knowledgeInput = document.getElementById('knowledge');
            if (knowledgeInput && knowledgeInput.files && knowledgeInput.files.length > 0) {
                for (const file of knowledgeInput.files) {
                    formData.append('knowledge', file);
                }
            }

            try {
                uploadBtn.disabled = true;
                uploadSpinner.style.display = 'block';
                uploadStatus.style.display = 'none';

                const url = `${API_BASE}/truckModel/${encodeURIComponent(truckModel)}/harnesses/${encodeURIComponent(harnessId)}`;
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const result = await response.json();
                    showStatus(uploadStatus, `Successfully uploaded ${result.uploadedKeys?.length || 0} files for truck model "${result.truckModel}", harness "${result.harnessId}"!`);
                    uploadForm.reset();
                } else {
                    showStatus(uploadStatus, `Upload failed: ${response.statusText}`, true);
                }
            } catch (error) {
                showStatus(uploadStatus, `Error uploading files: ${error.message}`, true);
            } finally {
                uploadBtn.disabled = false;
                uploadSpinner.style.display = 'none';
            }
        });

        // Handle Retrieve
        // - With truck model: GET /api/v1/truckModel/{truckModel}/harnesses/{harnessId}
        // - Without truck model: GET /api/v1/truckModel/harnesses/{harnessId}  (search across all)
        retrieveForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const truckModel = document.getElementById('searchTruckModel').value.trim();
            const harnessId = document.getElementById('searchHarnessId').value.trim();
            if (!harnessId) return;

            try {
                retrieveBtn.disabled = true;
                retrieveSpinner.style.display = 'block';
                retrieveStatus.style.display = 'none';
                fileList.innerHTML = '';

                let url;
                if (truckModel) {
                    url = `${API_BASE}/truckModel/${encodeURIComponent(truckModel)}/harnesses/${encodeURIComponent(harnessId)}`;
                } else {
                    url = `${API_BASE}/truckModel/harnesses/${encodeURIComponent(harnessId)}`;
                }

                const response = await fetch(url);

                if (response.ok) {
                    const data = await response.json();
                    const scopeMsg = truckModel
                        ? `Truck model: ${data.truckModel} | Harness: ${data.harnessId}`
                        : `Search across all truck models | Harness: ${data.harnessId}`;
                    showStatus(retrieveStatus, scopeMsg);
                    renderFiles(data.files || []);
                } else {
                    showStatus(retrieveStatus, `Failed to fetch: ${response.statusText}`, true);
                    fileList.innerHTML = '<div class="empty-state">No files found for this ID</div>';
                }
            } catch (error) {
                showStatus(retrieveStatus, `Error fetching files: ${error.message}`, true);
                fileList.innerHTML = '<div class="empty-state">Error occurred</div>';
            } finally {
                retrieveBtn.disabled = false;
                retrieveSpinner.style.display = 'none';
            }
        });

        // Render Files using FileDownloadController API
        function renderFiles(files) {
            if (files.length === 0) {
                fileList.innerHTML = '<div class="empty-state">No files found for this harness</div>';
                return;
            }

            fileList.innerHTML = files.map(file => {
                // Extract original file name roughly from the key/url
                const fileName = file.key ? file.key.split('/').pop() : 'download-file';
                // Use S3 direct URL if available, otherwise fallback to backend download API
                const downloadUrl = file.url || `${API_BASE}/files/download?key=${encodeURIComponent(file.key)}`;

                return `
                    <div class="file-item">
                        <div class="file-info">
                            <span class="file-name" title="${fileName}">${fileName}</span>
                            <span class="file-key" title="${file.key || file.url}">Path: ${file.key || 'External URL'}</span>
                        </div>
                        <a href="${downloadUrl}" class="download-btn" download target="_blank">Download</a>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>

</html>
