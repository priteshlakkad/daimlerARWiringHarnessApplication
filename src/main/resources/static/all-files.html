<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloadable Files – Daimler AR</title>
    <style>
        :root {
            --primary: #00adee;
            --primary-hover: #0099cc;
            --secondary: #1a1a1a;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 0.7s ease;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: -0.5px;
        }

        header p {
            color: #666;
            font-size: 1.05rem;
            margin-top: 0.4rem;
        }

        nav {
            margin-top: 0.8rem;
        }

        nav a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            max-width: 1100px;
            width: 100%;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.7s ease;
        }

        #searchInput {
            flex: 1;
            min-width: 220px;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: var(--transition);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 173, 238, 0.15);
        }

        #filterType {
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            background: #fff;
            cursor: pointer;
            transition: var(--transition);
        }

        #filterType:focus {
            outline: none;
            border-color: var(--primary);
        }

        #loadBtn {
            padding: 0.75rem 1.8rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
            white-space: nowrap;
        }

        #loadBtn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        #loadBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        .summary-bar {
            max-width: 1100px;
            width: 100%;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .summary-bar span {
            font-size: 0.92rem;
            color: #555;
        }

        #collapseAllBtn {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .results {
            max-width: 1100px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Truck group card */
        .truck-group {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            transition: var(--transition);
        }

        .truck-group:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.09);
        }

        .truck-header {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: #fff;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }

        .truck-header h2 {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .truck-header h2 .badge {
            background: var(--primary);
            font-size: 0.75rem;
            padding: 0.2rem 0.55rem;
            border-radius: 20px;
            font-weight: 600;
        }

        .truck-header .chevron {
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .truck-group.collapsed .chevron {
            transform: rotate(-90deg);
        }

        .truck-group.collapsed .truck-body {
            display: none;
        }

        .truck-body {
            padding: 1rem 1.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Harness sub-group */
        .harness-group {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .harness-header {
            background: #f0f4f8;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .harness-header .hcount {
            font-weight: 400;
            color: #888;
            font-size: 0.82rem;
        }

        .file-list {
            display: flex;
            flex-direction: column;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.7rem 1rem;
            border-top: 1px solid #f0f0f0;
            transition: background 0.2s ease;
            gap: 1rem;
        }

        .file-item:hover {
            background: #f9fbfc;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
        }

        .file-name {
            font-weight: 600;
            font-size: 0.92rem;
            color: #222;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-path {
            font-size: 0.77rem;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.15rem;
        }

        .file-type-tag {
            font-size: 0.72rem;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 700;
            white-space: nowrap;
            align-self: flex-start;
        }

        .tag-troubleshooting {
            background: #fff3e0;
            color: #e65100;
            border: 1px solid #ffcc80;
        }

        .tag-powerflow {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #a5d6a7;
        }

        .download-btn {
            background: var(--secondary);
            color: #fff;
            text-decoration: none;
            padding: 0.45rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .download-btn:hover {
            background: #333;
            transform: translateY(-1px);
        }

        .state-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: #888;
            font-size: 1.05rem;
            font-style: italic;
        }

        .error-msg {
            background: #fdecea;
            color: #b71c1c;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            max-width: 1100px;
            width: 100%;
            font-weight: 500;
            display: none;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }

            header h1 {
                font-size: 1.7rem;
            }

            .toolbar {
                flex-direction: column;
            }

            #loadBtn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>📥 Downloadable Files</h1>
        <p>Troubleshooting &amp; Powerflow files across all truck models</p>
        <nav><a href="/">← Back to main page</a></nav>
    </header>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Filter by file name, harness or truck…">
        <select id="filterType">
            <option value="">All types</option>
            <option value="/troubleshooting/">Troubleshooting</option>
            <option value="/powerflow/">Powerflow</option>
        </select>
        <button id="loadBtn" onclick="loadFiles()">
            <span>Load Files</span>
            <div class="spinner" id="spinner"></div>
        </button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="summary-bar" id="summaryBar" style="display:none;">
        <span id="summaryText"></span>
        <span id="collapseAllBtn" onclick="collapseAll()">Collapse all</span>
    </div>

    <div class="results" id="results">
        <div class="state-msg">Click "Load Files" to fetch all troubleshooting and powerflow files.</div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api/v1';
        let allData = [];

        async function loadFiles() {
            const btn = document.getElementById('loadBtn');
            const spinner = document.getElementById('spinner');
            const results = document.getElementById('results');
            const errorMsg = document.getElementById('errorMsg');
            const summaryBar = document.getElementById('summaryBar');

            btn.disabled = true;
            spinner.style.display = 'block';
            errorMsg.style.display = 'none';
            summaryBar.style.display = 'none';
            results.innerHTML = '<div class="state-msg">Loading…</div>';

            try {
                const resp = await fetch(`${API_BASE}/truckModel/downloadable-files`);
                if (!resp.ok) throw new Error(`Server returned ${resp.status} ${resp.statusText}`);
                const data = await resp.json();
                allData = data.files || [];
                applyFilters();
            } catch (err) {
                results.innerHTML = '';
                errorMsg.textContent = `Error: ${err.message}`;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();
            const typeFilter = document.getElementById('filterType').value;

            const filtered = allData.filter(f => {
                const key = (f.key || '').toLowerCase();
                if (typeFilter && !key.includes(typeFilter.toLowerCase())) return false;
                if (search && !key.includes(search)) return false;
                return true;
            });

            renderGroups(filtered);
        }

        function parseKey(key) {
            // cdn/v1/{truckModel}/harnesses/{harnessId}/subdir/file
            const parts = key.split('/');
            return {
                truckModel: parts[2] || 'unknown',
                harnessId: parts[4] || 'unknown',
                fileName: parts[parts.length - 1]
            };
        }

        function getTypeInfo(key) {
            if (key.includes('/troubleshooting/')) return { label: 'Troubleshooting', cls: 'tag-troubleshooting' };
            if (key.includes('/powerflow/')) return { label: 'Powerflow', cls: 'tag-powerflow' };
            return { label: 'File', cls: '' };
        }

        function renderGroups(files) {
            const results = document.getElementById('results');
            const summaryBar = document.getElementById('summaryBar');
            const summaryText = document.getElementById('summaryText');

            if (files.length === 0) {
                results.innerHTML = '<div class="state-msg">No files match your filter.</div>';
                summaryBar.style.display = 'none';
                return;
            }

            // Group: truckModel → harnessId → files[]
            const grouped = {};
            files.forEach(f => {
                const { truckModel, harnessId } = parseKey(f.key || '');
                grouped[truckModel] = grouped[truckModel] || {};
                grouped[truckModel][harnessId] = grouped[truckModel][harnessId] || [];
                grouped[truckModel][harnessId].push(f);
            });

            const trucks = Object.keys(grouped).sort();
            results.innerHTML = trucks.map(truck => {
                const harnesses = grouped[truck];
                const harnessNames = Object.keys(harnesses).sort();
                const totalFiles = harnessNames.reduce((s, h) => s + harnesses[h].length, 0);

                const harnessHtml = harnessNames.map(harnessId => {
                    const items = harnesses[harnessId].map(f => {
                        const { fileName } = parseKey(f.key);
                        const { label, cls } = getTypeInfo(f.key);
                        // Use S3 direct URL if available, otherwise fallback to backend download API
                        const downloadUrl = f.url || `${API_BASE}/files/download?key=${encodeURIComponent(f.key)}`;
                        return `
                            <div class="file-item">
                                <div class="file-info">
                                    <span class="file-name" title="${fileName}">${fileName}</span>
                                    <span class="file-path"  title="${f.key}">${f.key}</span>
                                </div>
                                <span class="file-type-tag ${cls}">${label}</span>
                                <a class="download-btn" href="${downloadUrl}" target="_blank" download>⬇ Download</a>
                            </div>`;
                    }).join('');

                    return `
                        <div class="harness-group">
                            <div class="harness-header">
                                <span>Harness: <strong>${harnessId}</strong></span>
                                <span class="hcount">${harnesses[harnessId].length} file(s)</span>
                            </div>
                            <div class="file-list">${items}</div>
                        </div>`;
                }).join('');

                return `
                    <div class="truck-group" id="truck-${truck}">
                        <div class="truck-header" onclick="toggleTruck('${truck}')">
                            <h2>🚛 ${truck} <span class="badge">${totalFiles} files</span></h2>
                            <span class="chevron">▼</span>
                        </div>
                        <div class="truck-body">${harnessHtml}</div>
                    </div>`;
            }).join('');

            summaryText.textContent =
                `Showing ${files.length} file(s) across ${trucks.length} truck model(s)`;
            summaryBar.style.display = 'flex';
        }

        function toggleTruck(truck) {
            document.getElementById('truck-' + truck).classList.toggle('collapsed');
        }

        function collapseAll() {
            document.querySelectorAll('.truck-group').forEach(el => el.classList.add('collapsed'));
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterType').addEventListener('change', applyFilters);
    </script>

</body>

</html>
