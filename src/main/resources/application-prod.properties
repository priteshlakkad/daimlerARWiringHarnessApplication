# ============================================
# PRODUCTION PROFILE - EC2 Deployment
# ============================================
# Activation: Use --spring.profiles.active=prod
# OR set: SPRING_PROFILES_ACTIVE=prod
# OR via environment variable: SPRING_ACTIVE_PROFILES=prod

# Application Configuration
spring.application.name=daimler-ar-wiring-harness-prod
server.port=8080
server.servlet.context-path=/api/v1

# ============================================
# LOGGING CONFIGURATION
# ============================================
# Production level: Only INFO and above
logging.level.root=WARN
logging.level.com.harness=INFO
logging.file.name=/var/log/harness/application.log
logging.file.max-size=50MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================
# STORAGE CONFIGURATION
# ============================================
# Set to 'true' only if IAM Role is attached to EC2 instance for S3 access
app.use-s3=false

# Local storage path (ensure directory exists and has proper permissions)
app.local-storage-path=/var/app/harness/uploads

# ============================================
# AWS S3 CONFIGURATION (if app.use-s3=true)
# ============================================
# IMPORTANT: On EC2, use IAM Role (no hardcoded credentials needed)
# The AWS SDK will automatically detect credentials from EC2 IAM Role
aws.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:AKIAIOSFODNN7EXAMPLE}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY}
aws.s3.bucket=${AWS_S3_BUCKET:diamler-storage-bucket}

# Note: If hardcoded credentials are needed, use:
# aws.accessKeyId=YOUR_ACCESS_KEY_HERE
# aws.secretAccessKey=YOUR_SECRET_KEY_HERE
# (NOT RECOMMENDED - Use IAM Role instead)

# Tomcat thread configuration
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.connection-timeout=20000

# Connection Pool (Hikari)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Compression settings
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================
# SWAGGER/API DOCUMENTATION
# ============================================
# Set to false in production if you want to hide API documentation
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/docs

