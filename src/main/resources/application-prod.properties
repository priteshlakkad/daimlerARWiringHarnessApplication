# Production Profile - Use this when deploying to EC2
# Set: SPRING_PROFILES_ACTIVE=prod

spring.application.name=daimler-ar-wiring-harness-prod
server.port=8081
server.servlet.context-path=/api/v1

# Logging - Production Level (WARN instead of INFO)
logging.level.root=WARN
logging.level.com.harness=INFO
logging.file.name=/var/log/harness/application.log
logging.file.max-size=50MB
logging.file.max-history=30

# Use S3 in Production
app.use-s3=true

# AWS S3 - Use IAM Role on EC2 (no need for hardcoded credentials)
# The credentials will be automatically picked up from EC2 IAM Role
aws.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:daimler-harness-cdn-prod}

# Local storage (as backup)
app.local-storage-path=/var/app/harness/uploads

# Performance optimizations
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000

